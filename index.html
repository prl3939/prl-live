<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PRL 101.7 – Live</title>
  <meta name="description" content="PRL 101.7 – No Stop Radio. Ascolta la diretta streaming con il player ufficiale." />
  <meta name="theme-color" content="#e23422" />
  <style>
    :root{
      --bg:#0e0f13; --panel: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.10);
      --text:#e7e9ef; --muted:#9aa3b2; --accent:#00d1b2; --accent-2:#2dd4bf; --brand:#e23422;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
      background: radial-gradient(1200px 700px at 80% -20%, #182030 0%, #0e0f13 60%),
                  radial-gradient(1000px 500px at -10% 110%, #0f1b25 0%, #0e0f13 70%);
      color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
    .wrap{width:100%; max-width:960px}
    header{text-align:center; margin-bottom:22px}
    .logo{display:block; width:min(140px, 40vw); height:auto; margin:0 auto 12px}
    h1{margin:0; font-size:clamp(26px, 5vw, 38px); line-height:1.1; letter-spacing:0.2px}
    .tagline{color:var(--muted); font-size:clamp(14px, 2.2vw, 16px); margin-top:6px}
    .card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,0.25)}
    .player{display:grid; grid-template-columns:88px 1fr; gap:16px; align-items:center}
    .cover{width:88px; height:88px; border-radius:12px; background:conic-gradient(from 220deg, var(--brand), #ff6a5f, var(--brand)); display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; text-shadow:0 1px 0 rgba(0,0,0,0.3)}
    .now{font-size:13px; color:var(--muted); margin-bottom:2px}
    .title{font-size:20px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .controls{display:flex; align-items:center; flex-wrap:wrap; gap:12px; margin-top:12px}
    button{appearance:none; border:none; cursor:pointer; font-weight:700; padding:10px 14px; border-radius:10px; font-size:15px; background:var(--accent); color:#00201b; transition:filter .15s ease, transform .06s ease}
    button:hover{ filter:brightness(1.06) }
    button:active{ transform:scale(0.98) }
    .btn-outline{background:transparent; color:var(--text); border:1px solid var(--border)}
    .status{margin-left:auto; color:var(--muted); font-size:14px}
    .bar{ display:flex; align-items:center; gap:8px }
    input[type="range"]{ width:220px }
    footer{ margin-top:12px; text-align:center; color:var(--muted); font-size:13px }
    @media (max-width:560px){.player{ grid-template-columns:64px 1fr } .cover{ width:64px; height:64px } input[type="range"]{ width:100% } .status{ flex:1 0 100%; margin-left:0 }}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="LOGO-PRL-ROSSO.png" alt="Logo PRL 101.7 - No Stop Radio" class="logo" width="512" height="512" />
      <h1>PRL 101.7</h1>
      <div class="tagline">No Stop · Radio – Musica, notizie e intrattenimento in diretta</div>
    </header>
    <section class="card" aria-label="Player radio PRL 101.7">
      <div class="player">
        <div class="cover" aria-hidden="true">LIVE</div>
        <div class="meta">
          <div class="now">In onda adesso</div>
          <div id="trackTitle" class="title">Connessione…</div>
          <div class="controls">
            <button id="playPauseBtn" aria-label="Riproduci">▶︎ Riproduci</button>
            <button id="stopBtn" class="btn-outline" aria-label="Stop">⏹ Stop</button>
            <label class="bar" for="volume">Volume
              <input type="range" id="volume" min="0" max="1" step="0.01" value="0.9" />
            </label>
            <span id="status" class="status" aria-live="polite">Pronto</span>
          </div>
        </div>
      </div>
      <audio id="radio" preload="none" crossorigin="anonymous">
        <source id="src" src="https://demo.azuracast.com/radio/8000/radio.mp3" type="audio/mpeg" />
        Il tuo browser non supporta l'elemento audio.
      </audio>
    </section>
    <footer>Se l’audio non parte, premi “Riproduci”: i browser bloccano l’autoplay con audio attivo.</footer>
  </div>
  <script>
    const STREAM_URL   = "https://demo.azuracast.com/radio/8000/radio.mp3"; // <--- metti qui il tuo URL stream
    const METADATA_URL = "https://demo.azuracast.com/status-json.xsl";      // <--- oppure metti null se non c'è
    const STATION_NAME = "PRL 101.7";

    const audio        = document.getElementById('radio');
    const playBtn      = document.getElementById('playPauseBtn');
    const stopBtn      = document.getElementById('stopBtn');
    const volume       = document.getElementById('volume');
    const trackTitleEl = document.getElementById('trackTitle');
    const statusEl     = document.getElementById('status');
    const srcEl        = document.getElementById('src');

    srcEl.src = STREAM_URL;

    function setStatus(t){ statusEl.textContent = t; }
    function setTitle(t){ trackTitleEl.textContent = t || STATION_NAME; }

    async function togglePlay(){
      try {
        if (audio.paused) {
          setStatus('Connessione allo stream…');
          await audio.play();
          playBtn.textContent = '⏸ Pausa';
          playBtn.setAttribute('aria-label','Pausa');
          setStatus('In riproduzione');
        } else {
          audio.pause();
          playBtn.textContent = '▶︎ Riproduci';
          playBtn.setAttribute('aria-label','Riproduci');
          setStatus('In pausa');
        }
      } catch (e) {
        setStatus('Autoplay bloccato. Premi Riproduci.');
      }
    }

    function hardStop(){
      audio.pause();
      audio.currentTime = 0;
      const current = srcEl.src;
      srcEl.src = '';
      srcEl.src = current + (current.includes('?') ? '&' : '?') + 't=' + Date.now();
      audio.load();
      playBtn.textContent = '▶︎ Riproduci';
      playBtn.setAttribute('aria-label','Riproduci');
      setStatus('Arrestato');
    }

    volume.addEventListener('input', ()=> audio.volume = parseFloat(volume.value));
    playBtn.addEventListener('click', togglePlay);
    stopBtn.addEventListener('click', hardStop);

    async function fetchMetadata(){
      if(!METADATA_URL) return;
      try{
        const res = await fetch(METADATA_URL, {cache:"no-store"});
        if(!res.ok) return;
        const data = await res.json();
        let now = null;
        if (Array.isArray(data) && data.length && data[0].now_playing) {
          now = data[0].now_playing.song?.text || data[0].now_playing.song?.title;
        }
        if (!now && data.icestats) {
          const sources = Array.isArray(data.icestats.source) ? data.icestats.source : [data.icestats.source];
          const active = sources.find(s => s && (s.title || s['artist'] || s['song']));
          if (active) now = active.title || [active.artist, active.song].filter(Boolean).join(' - ');
        }
        if (!now && (data.streamTitle || data.CurrentSong)) {
          now = data.streamTitle || data.CurrentSong;
        }
        setTitle((now && String(now).trim()) || 'In onda');
      } catch(_) {}
    }

    (function init(){
      audio.volume = parseFloat(volume.value);
      setTitle('In onda');
      setStatus('Pronto');
      fetchMetadata();
      setInterval(fetchMetadata, 15000);
    })();
  </script>
</body>
</html>
